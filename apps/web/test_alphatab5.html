<!DOCTYPE html>
<html>
<body>
  <div id="alphaTab" data-file="/alphatab/examples/canon.gp"></div>
  <script src="/Users/unknownseed/Developer/biubiutab/apps/web/node_modules/@coderline/alphatab/dist/alphaTab.js"></script>
  <script>
    const api = new alphaTab.AlphaTabApi(document.querySelector('#alphaTab'), { 
      core: { engine: 'svg', tracks: [0] }
    });
    api.scoreLoaded.on((score) => {
      console.log('Score loaded with tracks: ' + score.tracks.length);
      setTimeout(() => {
        console.log('SVGs after load: ' + document.querySelectorAll('svg').length);
        // let's call load again!
        api.load('/alphatab/examples/canon.gp', [0]);
        setTimeout(() => {
            console.log('SVGs after second load: ' + document.querySelectorAll('svg').length);
        }, 1000);
      }, 1000);
    });
  </script>
</body>
</html>
