<!DOCTYPE html>
<html>
<body>
  <div id="alphaTab" data-file="/alphatab/examples/canon.gp"></div>
  <script src="/Users/unknownseed/Developer/biubiutab/apps/web/node_modules/@coderline/alphatab/dist/alphaTab.js"></script>
  <script>
    const api = new alphaTab.AlphaTabApi(document.querySelector('#alphaTab'), {
      core: { engine: 'svg' },
      display: { layoutMode: 1 } // Page mode
    });
    api.scoreLoaded.on(() => {
      setTimeout(() => {
        const svgs = document.querySelectorAll('svg');
        let info = [];
        svgs.forEach((s, i) => {
          info.push(`SVG ${i}: width=${s.getAttribute('width')} height=${s.getAttribute('height')} class=${s.className.baseVal} defs=${s.querySelectorAll('defs').length}`);
        });
        console.log(info.join('\n'));
      }, 2000);
    });
  </script>
</body>
</html>
