<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.js"></script>
</head>
<body>
  <div id="alphaTab" style="width: 800px; height: 600px; background: #eee;"></div>
  <script>
    const api = new alphaTab.AlphaTabApi(document.querySelector("#alphaTab"), {
        core: { engine: "svg", useWorkers: false, logLevel: 0 },
        display: {
            staveProfile: alphaTab.StaveProfile.ScoreTab,
            layoutMode: alphaTab.LayoutMode.Page
        },
        stylesheet: {
            globalDisplayChordDiagramsOnTop: true,
            globalDisplayChordDiagramsInScore: false,
        }
      });
      // We render title + key outside of alphaTab for better spacing control.
      // But if we disable ScoreTitle, AlphaTab hides the entire header including Chord Diagrams!
      // So we keep ScoreTitle enabled, but set the title font sizes to 0 to make them invisible.
      api.settings.display.resources.titleFont.size = 0;
      api.settings.display.resources.subTitleFont.size = 0;
      // Do NOT set wordsFont.size to 0 so lyrics remain visible!
      
      api.settings.notation.elements.set(alphaTab.NotationElement.GuitarTuning, false);
      api.settings.notation.elements.set(alphaTab.NotationElement.ChordDiagrams, true);
      
    const urlParams = new URLSearchParams(window.location.search);
    const file = urlParams.get('file') || 'test_chords_real.gp5';
    fetch(file).then(r => r.arrayBuffer()).then(ab => {
        api.load(new Uint8Array(ab));
    });
  </script>
</body>
</html>
